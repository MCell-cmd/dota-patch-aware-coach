name: Deploy a Vercel (producción)

# Despliega a producción en cada push a main usando el Vercel CLI con token.
# No depende de la integración GitHub↔Vercel (que requiere OAuth interactivo):
# sube el build directo al proyecto, conservando env vars y dominio.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build & deploy (prebuilt)
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (producción)
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy (prebuilt → producción)
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
